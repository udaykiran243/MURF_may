name: Keep Render Apps Alive

on:
  schedule:
    # Runs every 10 minutes to prevent Render's 15-minute inactivity spin-down
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Frontend
        run: |
          curl -sSf https://murf-frontend.onrender.com/ > /dev/null
          echo "Frontend pinged successfully."

      - name: Ping Backend
        # We also ping the backend's health endpoint to keep the API server awake
        # (Change the URL if your backend name has random characters added by Render)
        run: |
          curl -sSf https://murf-backend.onrender.com/health > /dev/null || true
          echo "Backend pinged."